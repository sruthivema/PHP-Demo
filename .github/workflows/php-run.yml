name: Run PHP App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-php-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Run index.php
        run: php index.php

  sonar-quality-check:
    runs-on: ubuntu-latest
    needs: build-php-app
    steps:
       - name: Sonar Quality Check
         run: echo "SonarQube Check Passed Successfully"
         
  code-security-check:
    name: Test Stage
    runs-on: ubuntu-latest
    needs: sonar-quality-check

    steps:
      - name: Print Test Message
        run: echo "Code Security Check Completed"

  
