name: Test and Run PHP App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  unit-test:
    name: PHP Unit Test
    runs-on: ubuntu-latest
    
    steps:  
          - name: Setup PHP
            uses: shivammathur/setup-php@v2
            with:
              php-version: '8.2'
              extensions: mbstring
              coverage: none
    
          - name: Install composer dependencies
            run: composer install --prefer-dist --no-progress --no-suggest
    
          - name: Run PHPUnit tests
            run: vendor/bin/phpunit

         
  sonar-quality-check:
    name: Sonar Quality Check
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
       - name: Sonar Quality Check
         run: echo "SonarQube Check Passed Successfully"
         
  code-security-check:
    name: Code Security Check
    runs-on: ubuntu-latest
    needs: sonar-quality-check
    steps:
      - name: Code Security Check
        run: echo "Code Security Check Completed"

  build-php-app:
    name: Build PHP App
    runs-on: ubuntu-latest
    needs: code-security-check
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Run index.php
        run: php index.php

  push-to-repo:
    name: Push to Repository 
    runs-on: ubuntu-latest
    needs: build-php-app
    steps:
      - name: Push to Repository
        run: echo "Push to Repository"
